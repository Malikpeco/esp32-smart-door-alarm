<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maliks Smart Door</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      width: 420px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 5px;
    }

    .status {
      font-size: 14px;
      color: gray;
      margin-bottom: 15px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 10px;
      text-align: left;
      max-height: 250px;
      overflow-y: auto;
    }

    li {
      padding: 8px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }



  </style>
</head>

<body>
  <div class="box">
    <h1>Maliks Smart Door 🚪</h1>
    <div class="status">Status: <span id="status">Listening...</span></div>
    
    <h3>Motion Events</h3>
    <ul id="list"></ul>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
